kind = "web"
previewPath = "/"
title = "GnoseonX"
version = "1.0.0"
id = "artifacts/gnoseonx"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23064

[services.development]
run = "pnpm --filter @workspace/gnoseonx run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gnoseonx", "run", "build" ]
publicDir = "artifacts/gnoseonx/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23064"
BASE_PATH = "/"
